<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - RSGM Soelastri</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">

  <div id="login-screen" class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96 text-center">
      <h2 class="text-2xl font-bold mb-6">Login Admin</h2>
      <input type="text" id="username" placeholder="Username" class="border p-3 w-full rounded mb-4 focus:outline-none focus:border-blue-500">
      <input type="password" id="password" placeholder="Password" class="border p-3 w-full rounded mb-6 focus:outline-none focus:border-blue-500">
      <button onclick="login()" class="bg-blue-600 text-white w-full py-3 rounded font-bold hover:bg-blue-700 transition">Masuk</button>
      <button onclick="window.location.href='index.html'" class="mt-4 text-blue-600 text-sm block w-full text-center hover:underline">Kembali ke Beranda</button>
    </div>
  </div>

  <div id="dashboard" class="hidden min-h-screen">
    <div class="bg-blue-700 text-white p-4 flex justify-between items-center shadow-md">
      <h1 class="text-xl font-bold">Admin Dasbor</h1>
      <div><span id="admin-name" class="mr-4 font-bold"></span><button onclick="logout()" class="bg-red-500 px-4 py-1 rounded text-sm font-bold shadow hover:bg-red-600">Keluar</button></div>
    </div>
    
    <div class="p-6">
      <div class="bg-white rounded-xl shadow p-5 overflow-x-auto border">
        <h3 class="font-bold text-lg mb-4 text-gray-800">Manajemen Data Ajuan</h3>
        <table class="w-full text-left text-sm whitespace-nowrap border-collapse">
          <thead class="bg-gray-100">
            <tr class="text-gray-700 border-b"><th class="p-4 font-bold">ID Ajuan</th><th class="p-4 font-bold">Peneliti</th><th class="p-4 font-bold">Institusi</th><th class="p-4 font-bold">Status Utama</th><th class="p-4 font-bold">Aksi Dokumen</th></tr>
          </thead>
          <tbody id="table-body" class="text-gray-600"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // =========================================================================
    // 1. SETUP KONEKSI SUPABASE DI SINI (GANTI DENGAN KODE ANDA)
    // =========================================================================
    const SUPABASE_URL = 'https://lkzplpejlwagavakmeep.supabase.co/rest/v1/';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrenBscGVqbHdhZ2F2YWttZWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjQ0ODIsImV4cCI6MjA5NzA0MDQ4Mn0.YgXbAFdCdqpjT6sEutw7wJwSwUWj9qFBtRvBniXCqiI';
    
    const _supabaseApp = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // =========================================================================
    // 2. LOGIKA ADMIN
    // =========================================================================
    if(localStorage.getItem('admin_login') === 'true') {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('admin-name').innerText = localStorage.getItem('admin_user');
      loadData();
    }

    async function login() {
      let u = document.getElementById('username').value.trim(); 
      let p = document.getElementById('password').value.trim();
      
      if(!u || !p) { Swal.fire('Peringatan', 'Username dan Password tidak boleh kosong', 'warning'); return; }
      
      const { data, error } = await _supabaseApp.from('admin_users').select('*').eq('username', u).eq('password', p).maybeSingle();
      
      if(error) { Swal.fire('Error', error.message, 'error'); return; }
      
      if(data) {
        localStorage.setItem('admin_login', 'true'); 
        localStorage.setItem('admin_user', data.username);
        window.location.reload();
      } else { 
        Swal.fire('Akses Ditolak', 'Username atau Password salah!', 'error'); 
      }
    }

    function logout() { localStorage.clear(); window.location.reload(); }

    async function loadData() {
      const { data, error } = await _supabaseApp.from('ajuan').select('*').order('created_at', { ascending: false });
      if(error || !data) return;
      let tbody = document.getElementById('table-body'); tbody.innerHTML = '';
      
      if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center">Belum ada data masuk</td></tr>'; return; }

      data.forEach(r => {
        let options = ['Menunggu Verifikasi', 'Menunggu Pembayaran', 'Diproses', 'Acc / Disetujui', 'Selesai', 'Selesai Lengkap', 'Ditolak']
          .map(o => `<option ${r.status===o?'selected':''}>${o}</option>`).join('');
        
        let links = ``;
        if(r.link_permohonan) links += `<a href="${r.link_permohonan}" target="_blank" class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold mr-1 inline-block"><i class="fas fa-file-alt"></i> Berkas</a>`;
        if(r.link_bayar) links += `<a href="${r.link_bayar}" target="_blank" class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold mr-1 inline-block"><i class="fas fa-wallet"></i> Bukti Bayar</a>`;
        if(r.link_hasil) links += `<a href="${r.link_hasil}" target="_blank" class="bg-purple-100 text-purple-700 px-2 py-1 rounded text-xs font-bold inline-block"><i class="fas fa-check"></i> Hasil</a>`;

        tbody.innerHTML += `<tr class="border-b hover:bg-gray-50">
          <td class="p-4 font-bold text-blue-800">${r.id_ajuan}</td>
          <td class="p-4 font-semibold">${r.nama}</td>
          <td class="p-4">${r.institusi}<br><span class="text-xs text-yellow-600 bg-yellow-50 px-1 rounded font-bold">${r.jenjang}</span></td>
          <td class="p-4"><select onchange="ubahStatus('${r.id_ajuan}', this.value)" class="border border-gray-300 p-1.5 rounded bg-white font-medium text-sm text-gray-700 focus:outline-none">${options}</select></td>
          <td class="p-4 whitespace-nowrap">${links ? links : '<span class="text-xs text-gray-400 italic">Tidak ada berkas</span>'}</td>
        </tr>`;
      });
    }

    async function ubahStatus(id, newStatus) {
      const { error } = await _supabaseApp.from('ajuan').update({ status: newStatus }).eq('id_ajuan', id);
      if(error) Swal.fire('Gagal', error.message, 'error');
      else Swal.fire('Sukses', 'Status berhasil diperbarui', 'success');
    }
  </script>
</body>
</html>
